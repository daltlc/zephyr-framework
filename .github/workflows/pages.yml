name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install and build
        run: npm ci && npm run build

      - name: Prepare pages directory
        run: |
          mkdir _site
          cp index.html _site/
          cp demo.css _site/
          cp zephyr-framework.js zephyr-framework.min.js _site/
          cp zephyr-framework.css zephyr-framework.min.css _site/
          cp zephyr-agent-widget.js zephyr-agent-widget.min.js _site/
          cp zephyr-schema.json _site/
          cp zephyr-prompt.md _site/
          cp zephyr-a2ui-catalog.json _site/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
